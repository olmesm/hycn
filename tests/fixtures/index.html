<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>HYCN Playwright fixtures</title>
		<style>
			body { font-family: system-ui, sans-serif; margin: 2rem; }
			.fixture { margin-block: 2rem; }
			hycn-menu > :not([slot]) { background: Canvas; border: 0; padding: .5rem; text-align: start; }
			hycn-tabs > [slot="tab"] { padding: .5rem .75rem; }
		</style>
	</head>
	<body>
		<main>
			<h1>HYCN component fixtures</h1>

			<section class="fixture" id="accordion-fixture">
				<h2>Accordion</h2>
				<hycn-accordion exclusive>
					<details open>
						<summary>First question</summary>
						<p>First answer</p>
					</details>
					<details>
						<summary>Second question</summary>
						<p>Second answer</p>
					</details>
					<details disabled>
						<summary>Disabled question</summary>
						<p>Disabled answer</p>
					</details>
				</hycn-accordion>
			</section>

			<section class="fixture" id="dialog-fixture">
				<h2>Dialog</h2>
				<button id="open-dialog" type="button">Open dialog</button>
				<hycn-dialog label="Account settings">
					<h3>Account settings</h3>
					<button id="dialog-first" type="button">Save</button>
					<button id="dialog-close" type="button">Cancel</button>
					<nested-focus></nested-focus>
				</hycn-dialog>
			</section>

			<section class="fixture" id="form-controls-fixture">
				<h2>Form controls</h2>
				<form id="control-form">
					<hycn-checkbox name="updates" required value="yes">Email updates</hycn-checkbox>
					<hycn-switch name="theme" value="dark">Dark mode</hycn-switch>
					<hycn-radio-group label="Size" name="size" required></hycn-radio-group>
					<hycn-slider label="Volume" name="volume" value="40"></hycn-slider>
					<button type="reset">Reset controls</button>
				</form>
			</section>

			<section class="fixture">
				<h2>Tabs</h2>
				<hycn-tabs>
					<button slot="tab" type="button">Overview</button>
					<button disabled slot="tab" type="button">Disabled</button>
					<button slot="tab" type="button">API</button>
					<div slot="panel">Overview panel</div>
					<div slot="panel">Disabled panel</div>
					<div slot="panel">API panel</div>
				</hycn-tabs>
			</section>

			<section class="fixture">
				<h2>Menu</h2>
				<hycn-menu label="Actions">
					<button slot="trigger" type="button">Actions</button>
					<button data-value="edit" type="button">Edit</button>
					<hr slot="" />
					<div aria-disabled="true" data-value="disabled">Disabled action</div>
					<div data-value="duplicate" slot="">Duplicate</div>
				</hycn-menu>
			</section>

			<section class="fixture">
				<h2>Combobox</h2>
				<hycn-combobox label="Country" placeholder="Select a country"></hycn-combobox>
			</section>

			<section class="fixture">
				<h2>Tree</h2>
				<hycn-tree label="Project files"></hycn-tree>
			</section>

			<button id="outside" type="button">Outside target</button>
		</main>

		<script type="module">
			import "/dist/register.js"

			customElements.define("nested-focus", class extends HTMLElement {
				constructor() {
					super()
					this.attachShadow({ mode: "open" }).innerHTML = '<button id="nested-button" type="button">Nested action</button>'
				}
			})

			await Promise.all([
				"hycn-accordion",
				"hycn-checkbox",
				"hycn-dialog",
				"hycn-tabs",
				"hycn-menu",
				"hycn-radio-group",
				"hycn-slider",
				"hycn-switch",
				"hycn-combobox",
				"hycn-tree",
			].map((tag) => customElements.whenDefined(tag)))

			const dialog = document.querySelector("hycn-dialog")
			document.querySelector("#open-dialog").addEventListener("click", () => { dialog.open = true })
			document.querySelector("#dialog-close").addEventListener("click", () => dialog.close("button"))

			const combobox = document.querySelector("hycn-combobox")
			combobox.options = [
				{ label: "France", value: "fr" },
				{ label: "Spain", value: "es" },
				{ disabled: true, label: "Unavailable", value: "none" },
			]

			const tree = document.querySelector("hycn-tree")
			tree.items = [
				{ id: "src", label: "src", children: [
					{ id: "components", label: "components" },
					{ id: "index", label: "index.ts" },
				] },
				{ id: "readme", label: "README.md" },
			]

			document.querySelector("hycn-radio-group").options = [
				{ label: "Small", value: "s" },
				{ label: "Medium", value: "m" },
				{ disabled: true, label: "Large", value: "l" },
			]
		</script>
	</body>
</html>
